name: tk_clocking_system
description: "TK Clocking System — Ghana-ready workforce time & attendance SaaS app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  local_auth: ^2.3.0
  local_auth_android: ^1.0.56
  local_auth_darwin: ^1.6.1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Dependency injection
  get_it: ^8.0.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Functional programming (Either, Option)
  dartz: ^0.10.1

  # Local storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Offline-first database
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^6.1.0

  # Location / GPS
  geolocator: ^13.0.2

  # Camera (selfie verification)
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # QR code scanning
  mobile_scanner: ^6.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  crypto: ^3.0.5
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon.png
  remove_alpha_ios: true
